<!DOCTYPE html>
<html>
<head>
<title>Election Dashboard</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
}
h2 { text-align:center; margin-top:15px; }

.top-bar {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
  flex-wrap:wrap;
}

input, select, button {
  padding:10px;
  border-radius:5px;
  border:none;
}

button {
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111;
  border-radius:10px;
  padding:10px;
}

.card img {
  width:100%;
  height:180px;
  object-fit:contain;
  background:black;
}

.roundBox {
  border:1px solid #333;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<h2>Election Dashboard</h2>

<div class="top-bar">
  <select id="lac">
    <option>Lakhipur</option>
    <option>Udharbond</option>
    <option>Borkhola</option>
    <option>Katigorah</option>
    <option>Silchar</option>
    <option>Sonai</option>
    <option>Dholai</option>
  </select>

  <input type="number" id="round" placeholder="Round No">
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
</div>

<h3 style="text-align:center;">Live Screens</h3>
<div id="grid" class="grid"></div>

<h3 style="text-align:center;">Round List</h3>
<div id="roundList"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// 🔥 CLOUDINARY UPLOAD (FINAL FIXED)
async function upload() {
  const lac = document.getElementById("lac").value;
  const round = document.getElementById("round").value;
  const fileInput = document.getElementById("file");

  if (!round) return alert("Enter round ❗");
  if (!fileInput.files.length) return alert("Select file ❗");

  const file = fileInput.files[0];

  const formData = new FormData();
  formData.append("file", file);

  // ⚠️ IMPORTANT — exact preset name
  formData.append("upload_preset", "upload_test_1");
  formData.append("cloud_name", "dekoojdy1");

  try {
    const res = await fetch(
      "https://api.cloudinary.com/v1_1/dekoojdy1/image/upload",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await res.json();

// 🔥 DEBUG START
console.log("FULL RESPONSE:", data);

if (data.error) {
  alert("❌ ERROR: " + JSON.stringify(data.error));
  return;
}
// 🔥 DEBUG END

if (!data.secure_url) {
  alert("❌ Upload failed - no URL");
  return;
}

    // 🔥 SHOW FULL ERROR
    if (data.error) {
      alert("❌ " + data.error.message);
      return;
    }

    await db.collection("lacData")
      .doc(lac)
      .collection("rounds")
      .doc("round" + round)
      .set({
        fileData: data.secure_url,
        round,
        lac,
        time: Date.now()
      });

    alert("✅ Upload Success");

    loadGrid();
    loadRounds();

  } catch (err) {
    console.error(err);
    alert("❌ Upload error");
  }
}
// 🔹 GRID (fixed placeholder)
async function loadGrid(){
  const lacs = ["Lakhipur","Udharbond","Borkhola","Katigorah","Silchar","Sonai","Dholai"];
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  for(let lac of lacs){
    const snap = await db.collection("lacData")
      .doc(lac)
      .collection("rounds")
      .orderBy("time","desc")
      .limit(1)
      .get();

    let img = "https://dummyimage.com/300x200/000/fff&text=No+Image"; // ✅ fixed

    snap.forEach(d=>{
      img = d.data().fileData;
    });

    grid.innerHTML += `
      <div class="card">
        <h4>${lac}</h4>
        <img src="${img}">
      </div>
    `;
  }
}


// 🔹 ROUND LIST
async function loadRounds(){
  const lac = document.getElementById("lac").value;
  const div = document.getElementById("roundList");

  const snap = await db.collection("lacData")
    .doc(lac)
    .collection("rounds")
    .orderBy("time","desc")
    .get();

  div.innerHTML="";

  snap.forEach(doc=>{
    const d = doc.data();

    div.innerHTML += `
      <div class="roundBox">
        <h3>${lac} - Round ${d.round}</h3>
        <img src="${d.fileData}" width="300">
      </div>
    `;
  });
}


// INIT
document.getElementById("lac").addEventListener("change", loadRounds);
loadGrid();
loadRounds();

</script>

</body>
</html>
