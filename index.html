<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Upload Result</h2>

  <input type="file" id="file"><br><br>

  <select id="lac">
    <option>Lakhipur</option>
    <option>Udharbond</option>
    <option>Borkhola</option>
    <option>Katigorah</option>
    <option>Silchar</option>
    <option>Sonai</option>
    <option>Dholai</option>
  </select><br><br>

  <button onclick="previewFile()">Preview</button>
  <button onclick="uploadFile()">Publish</button>
  <button onclick="deleteData()">Delete</button>

  <br><br>
  <div id="preview"></div>
</div>

<!-- ✅ Firebase SDK (MUST be added) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- ✅ Firebase Config -->
<script src="firebase.js"></script>

<!-- ✅ Your Script -->
<script>
let base64Data = "";
let fileType = "";

function previewFile() {
  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("Select file first");
    return;
  }

  fileType = file.type;

  const reader = new FileReader();
  reader.onload = function(e) {
    base64Data = e.target.result;

    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    const img = document.createElement("img");
    img.src = base64Data;
    img.style.width = "300px";
    preview.appendChild(img);
  };

  reader.readAsDataURL(file);
}

async function uploadFile() {
  const lac = document.getElementById("lac").value;

  if (!base64Data) {
    alert("Preview first");
    return;
  }

  try {
    await db.collection("lacData").doc(lac).set({
      fileData: base64Data,
      type: fileType,
      updatedAt: Date.now()
    });

    alert("Uploaded Successfully");
  } catch (error) {
    console.error(error);
    alert("Upload Failed");
  }
}

async function deleteData() {
  const lac = document.getElementById("lac").value;

  try {
    await db.collection("lacData").doc(lac).delete();
    alert("Deleted");
  } catch (error) {
    console.error(error);
    alert("Delete Failed");
  }
}
</script>

</body>
</html>
