<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Upload Result</h2>

  <input type="file" id="file"><br><br>

  <select id="lac">
    <option>Lakhipur</option>
    <option>Udharbond</option>
    <option>Borkhola</option>
    <option>Katigorah</option>
    <option>Silchar</option>
    <option>Sonai</option>
    <option>Dholai</option>
  </select><br><br>

  <button onclick="previewFile()">Preview</button>
  <button onclick="uploadFile()">Publish</button>
  <button onclick="deleteData()">Delete</button>

  <br><br>
  <div id="preview"></div>
</div>

<script type="module">
import { db, doc, setDoc, deleteDoc } from './firebase.js';

let base64Data = "";
let fileType = "";

// 🔍 PREVIEW FILE
window.previewFile = function() {
  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("Please select a file first");
    return;
  }

  fileType = file.type;

  const reader = new FileReader();

  reader.onload = function(e) {
    base64Data = e.target.result;

    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    if (fileType.includes("image")) {
      const img = document.createElement("img");
      img.src = base64Data;
      img.style.width = "300px";
      img.style.border = "2px solid white";
      preview.appendChild(img);
    } else {
      preview.innerHTML = "<p>PDF selected (preview not shown)</p>";
    }
  };

  reader.readAsDataURL(file);
};

// 🚀 UPLOAD DATA (Firestore only)
window.uploadFile = async function() {
  const lac = document.getElementById("lac").value;

  if (!base64Data) {
    alert("Please preview file first");
    return;
  }

  try {
    await setDoc(doc(db, "lacData", lac), {
      fileData: base64Data,
      type: fileType,
      updatedAt: Date.now()
    });

    alert("✅ Uploaded Successfully");
  } catch (error) {
    console.error(error);
    alert("❌ Upload failed");
  }
};

// 🗑 DELETE DATA
window.deleteData = async function() {
  const lac = document.getElementById("lac").value;

  try {
    await deleteDoc(doc(db, "lacData", lac));
    alert("🗑 Deleted Successfully");
  } catch (error) {
    console.error(error);
    alert("❌ Delete failed");
  }
};
</script>

</body>
</html>
