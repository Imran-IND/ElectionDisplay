<!DOCTYPE html>
<html>
<head>
  <title>Admin Control Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">

  <style>
    .layout {
      display: flex;
      gap: 30px;
      padding: 20px;
    }

    .panel {
      flex: 1;
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }

    .preview-box img {
      width: 100%;
      border-radius: 8px;
    }

    .current-box img {
      width: 100%;
      border: 3px solid transparent;
      border-radius: 8px;
      cursor: pointer;
    }

    .selected {
      border: 3px solid yellow;
    }

    h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">⚙️ Admin Control Panel</h2>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="panel">
    <h3>Upload / Replace</h3>

    <select id="lac">
      <option>Lakhipur</option>
      <option>Udharbond</option>
      <option>Borkhola</option>
      <option>Katigorah</option>
      <option>Silchar</option>
      <option>Sonai</option>
      <option>Dholai</option>
    </select><br><br>

    <input type="file" id="file"><br><br>

    <button onclick="previewFile()">Preview</button>
    <button onclick="uploadFile()">Upload / Replace</button>
    <button onclick="deleteSelected()">Delete Selected</button>

    <h3>Preview</h3>
    <div id="preview" class="preview-box"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <h3>Current Content (Click to Select)</h3>
    <div id="currentData" class="current-box"></div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
let base64Data = "";
let fileType = "";
let selected = false;

function previewFile() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select file first");

  fileType = file.type;

  const reader = new FileReader();
  reader.onload = function(e) {
    base64Data = e.target.result;

    const preview = document.getElementById("preview");
    preview.innerHTML = `<img src="${base64Data}">`;
  };
  reader.readAsDataURL(file);
}

async function uploadFile() {
  const lac = document.getElementById("lac").value;

  if (!base64Data) {
    alert("Preview first ❗");
    return;
  }

  try {
    await db.collection("lacData").doc(lac).set({
      fileData: base64Data,
      type: fileType,
      updatedAt: Date.now()
    });

    alert("Replaced Successfully ✅");

    // Clear preview after upload
    base64Data = "";
    document.getElementById("preview").innerHTML = "";

    // Refresh current view
    loadCurrent();

  } catch (err) {
    console.error(err);
    alert("Upload failed ❌");
  }
}

async function deleteSelected() {
  const lac = document.getElementById("lac").value;

  if (!selected) {
    alert("Select item first ❗");
    return;
  }

  await db.collection("lacData").doc(lac).delete();

  alert("Deleted ✅");
  selected = false;
  loadCurrent();
}

async function loadCurrent() {
  const lac = document.getElementById("lac").value;
  const doc = await db.collection("lacData").doc(lac).get();

  const div = document.getElementById("currentData");
  div.innerHTML = "";
  selected = false;

  if (!doc.exists) {
    div.innerHTML = "No content available";
    return;
  }

  const data = doc.data();

  if (data.type.includes("image")) {
    const img = document.createElement("img");
    img.src = data.fileData;

    img.onclick = () => {
      img.classList.toggle("selected");
      selected = !selected;
    };

    div.appendChild(img);
  }
}

document.getElementById("lac").addEventListener("change", loadCurrent);
window.onload = loadCurrent;
</script>

</body>
</html>
