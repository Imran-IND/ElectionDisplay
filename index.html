<!DOCTYPE html>
<html>
<head>
<title>Election Control Panel</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">

<style>
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: contain;
}

.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal img {
  max-width:90%;
  max-height:90%;
}

.panel {
  padding:20px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">📊 Election Dashboard</h2>

<div class="panel">

<select id="lac">
  <option>Lakhipur</option>
  <option>Udharbond</option>
  <option>Borkhola</option>
  <option>Katigorah</option>
  <option>Silchar</option>
  <option>Sonai</option>
  <option>Dholai</option>
</select>

<input type="number" id="round" placeholder="Enter Round No">

<input type="file" id="file">

<button onclick="upload()">Upload</button>

</div>

<h3 style="text-align:center;">📺 Live Screens</h3>

<div id="grid" class="grid"></div>

<h3 style="text-align:center;">📂 Round List</h3>

<div id="roundList"></div>

<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
let base64 = "";

document.getElementById("file").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = e2 => base64 = e2.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

async function upload() {
  const lac = document.getElementById("lac").value;
  const round = document.getElementById("round").value;

  if(!round) return alert("Enter round");

  await db.collection("lacData")
    .doc(lac)
    .collection("rounds")
    .doc("round"+round)
    .set({
      fileData: base64,
      round: round,
      time: Date.now()
    });

  alert("Uploaded Round " + round);
  loadRounds();
  loadGrid();
}

function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

async function loadGrid(){
  const lacs = ["Lakhipur","Udharbond","Borkhola","Katigorah","Silchar","Sonai","Dholai"];
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  for(let lac of lacs){
    const snap = await db.collection("lacData")
      .doc(lac)
      .collection("rounds")
      .orderBy("time","desc")
      .limit(1)
      .get();

    let img = "";

    snap.forEach(d=>{
      img = d.data().fileData;
    });

    grid.innerHTML += `
      <div class="card" onclick="openModal('${img}')">
        <h4>${lac}</h4>
        <img src="${img}">
      </div>
    `;
  }
}

async function loadRounds(){
  const lac = document.getElementById("lac").value;
  const div = document.getElementById("roundList");

  const snap = await db.collection("lacData")
    .doc(lac)
    .collection("rounds")
    .orderBy("time","desc")
    .get();

  div.innerHTML="";

  snap.forEach(doc=>{
    const d = doc.data();

    div.innerHTML += `
      <div style="margin:10px; border:1px solid #333; padding:10px;">
        <h4>Round ${d.round}</h4>
        <img src="${d.fileData}" style="width:200px">
        <br>
        <button onclick="deleteRound('${lac}','${doc.id}')">Delete</button>
        <button onclick="openModal('${d.fileData}')">View</button>
      </div>
    `;
  });
}

async function deleteRound(lac,id){
  await db.collection("lacData")
    .doc(lac)
    .collection("rounds")
    .doc(id)
    .delete();

  loadRounds();
  loadGrid();
}

document.getElementById("lac").addEventListener("change", loadRounds);

loadGrid();
loadRounds();
</script>

</body>
</html>
