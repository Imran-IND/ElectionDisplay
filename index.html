<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body>

<div class="container">
  <h2>Upload Result</h2>

  <input type="file" id="file"><br><br>

  <select id="lac">
    <option>Lakhipur</option>
    <option>Udharbond</option>
    <option>Borkhola</option>
    <option>Katigorah</option>
    <option>Silchar</option>
    <option>Sonai</option>
    <option>Dholai</option>
  </select><br><br>

  <button onclick="previewFile()">Preview</button>
  <button onclick="uploadFile()">Publish</button>
  <button onclick="deleteData()">Delete</button>

  <h3>Preview</h3>
  <div id="preview"></div>

  <h3>Current Uploaded</h3>
  <div id="currentData"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
let base64Data = "";
let fileType = "";

function previewFile() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select file first");

  fileType = file.type;

  const reader = new FileReader();
  reader.onload = function(e) {
    base64Data = e.target.result;

    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    const img = document.createElement("img");
    img.src = base64Data;
    img.style.width = "300px";
    preview.appendChild(img);
  };

  reader.readAsDataURL(file);
}

async function uploadFile() {
  const lac = document.getElementById("lac").value;

  if (!base64Data) return alert("Preview first");

  await db.collection("lacData").doc(lac).set({
    fileData: base64Data,
    type: fileType,
    updatedAt: Date.now()
  });

  alert("Uploaded ✅");
  loadCurrent();
}

async function deleteData() {
  const lac = document.getElementById("lac").value;

  await db.collection("lacData").doc(lac).delete();
  alert("Deleted ✅");

  document.getElementById("currentData").innerHTML = "No data";
}

async function loadCurrent() {
  const lac = document.getElementById("lac").value;
  const doc = await db.collection("lacData").doc(lac).get();

  const div = document.getElementById("currentData");
  div.innerHTML = "";

  if (!doc.exists) {
    div.innerHTML = "No data uploaded";
    return;
  }

  const data = doc.data();

  if (data.type.includes("image")) {
    const img = document.createElement("img");
    img.src = data.fileData;
    img.style.width = "200px";
    div.appendChild(img);
  }
}

document.getElementById("lac").addEventListener("change", loadCurrent);
window.onload = loadCurrent;
</script>

</body>
</html>
