<!DOCTYPE html>
<html>
<head>
<title>Election Dashboard</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
}
h2 { text-align:center; margin-top:15px; }

.top-bar {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
  flex-wrap:wrap;
}

input, select, button {
  padding:10px;
  border-radius:5px;
  border:none;
}

button {
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111;
  border-radius:10px;
  padding:10px;
}

.card img {
  width:100%;
  height:180px;
  object-fit:contain;
  cursor:pointer;
}

.roundBox {
  border:1px solid #333;
  margin:10px;
  padding:10px;
}

.roundBox img {
  width:300px;
  cursor:pointer;
}

.deleteBtn { background:red; }
.replaceBtn { background:orange; }

/* 🔴 FULL SCREEN COUNTDOWN */
#updateOverlay {
  position:fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  text-align:center;
}

#updateText {
  font-size:4vw;
  font-weight:bold;
}

#countdown {
  font-size:18vw;
  font-weight:bold;
  margin-top:20px;
}

.card iframe {
  width: 100%;
  height: 180px;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>Election Dashboard</h2>

<div class="top-bar">
  <select id="lac">
    <option>Lakhipur</option>
    <option>Udharbond</option>
    <option>Borkhola</option>
    <option>Katigorah</option>
    <option>Silchar</option>
    <option>Sonai</option>
    <option>Dholai</option>
  </select>

  <input type="number" id="round" placeholder="Round No">
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
</div>

<h3 style="text-align:center;">Live Screens</h3>
<div id="grid" class="grid"></div>

<h3 style="text-align:center;">Round List</h3>
<div id="roundList"></div>

<!-- 🔹 POPUP -->
<div id="popup" style="position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:999;">
  <img id="popupImg" style="max-width:90%;max-height:90%;">
</div>

<!-- 🔴 COUNTDOWN OVERLAY -->
<div id="updateOverlay">
  <div id="updateText"></div>
  <div id="countdown"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// 🔹 OPTIONAL: LAC from URL (for quick filter)
const urlParams = new URLSearchParams(window.location.search);
const selectedLacFromURL = urlParams.get("lac");

if (selectedLacFromURL) {
  document.getElementById("lac").value = selectedLacFromURL;
}

// 🔥 UPLOAD / REPLACE IMAGE
async function upload() {
  const lac = document.getElementById("lac").value;
  const round = document.getElementById("round").value;
  const fileInput = document.getElementById("file");

  if (!round) return alert("Enter round ❗");
  if (!fileInput.files.length) return alert("Select file ❗");

  const file = fileInput.files[0];

  const formData = new FormData();
  formData.append("file", file);

  // ✅ YOUR CLOUDINARY PRESET
  formData.append("upload_preset", "upload_test_1");

  try {
    const res = await fetch(
      "https://api.cloudinary.com/v1_1/dekoojdy1/image/upload",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await res.json();

    if (data.error) {
      alert("❌ " + data.error.message);
      return;
    }

    if (!data.secure_url) {
      alert("❌ Upload failed");
      return;
    }

    // 🔥 SAVE TO FIRESTORE
    await db.collection("lacData")
      .doc(lac)
      .collection("rounds")
      .doc("round" + round)
      .set({
        fileData: data.secure_url,
        round,
        lac,
        time: Date.now()
      });

    alert("✅ Upload Successful");

    // 🔄 Reset input
    document.getElementById("file").value = "";

    // 🔄 Refresh UI properly
    setTimeout(() => {
      loadGrid();
      loadRounds();
    }, 500);

  } catch (err) {
    console.error(err);
    alert("❌ Upload error");
  }
}


// 🔹 LOAD LIVE GRID
async function loadGrid(){
  const lacs = ["Lakhipur","Udharbond","Borkhola","Katigorah","Silchar","Sonai","Dholai"];
  const grid = document.getElementById("grid");

  grid.innerHTML = "";

  for (let lac of lacs) {

    const snap = await db.collection("lacData")
      .doc(lac)
      .collection("rounds")
      .orderBy("time","desc")
      .limit(1)
      .get();

    let img = "https://dummyimage.com/300x200/000/fff&text=No+Image";

    snap.forEach(doc => {
      img = doc.data().fileData;
    });

    grid.innerHTML += `
      <div class="card">
        <h4>${lac}</h4>
        <img src="lac.html?name=${lac}"></img>
      </div>
    `;
  }
}


// 🔹 LOAD ROUND LIST
async function loadRounds(){
  const lac = document.getElementById("lac").value;
  const div = document.getElementById("roundList");

  const snap = await db.collection("lacData")
    .doc(lac)
    .collection("rounds")
    .orderBy("time","desc")
    .get();

  div.innerHTML = "";

  snap.forEach(doc => {
    const d = doc.data();

    div.innerHTML += `
      <div class="roundBox">
        <h3>${lac} - Round ${d.round}</h3>
        <img src="${d.fileData}" onclick="openPopup('${d.fileData}')">
        <br><br>
        <button class="deleteBtn" onclick="deleteRound('${lac}','${d.round}')">Delete</button>
        <button class="replaceBtn" onclick="prepareReplace('${d.round}')">Replace</button>
      </div>
    `;
  });
}


// 🔹 DELETE ROUND
async function deleteRound(lac, round){
  if (!confirm("Delete this round?")) return;

  await db.collection("lacData")
    .doc(lac)
    .collection("rounds")
    .doc("round"+round)
    .delete();

  loadGrid();
  loadRounds();
}


// 🔹 PREPARE REPLACE
function prepareReplace(round){
  document.getElementById("round").value = round;
  window.scrollTo({ top: 0, behavior: "smooth" });
}


// 🔹 POPUP VIEW
function openPopup(src){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

// CLOSE POPUP
document.getElementById("popup").onclick = () => {
  document.getElementById("popup").style.display = "none";
};


// 🔹 EVENTS
document.getElementById("lac").addEventListener("change", loadRounds);


// 🔹 INIT
loadGrid();
loadRounds();

</script>
</body>
</html>
