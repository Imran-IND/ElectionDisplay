<!DOCTYPE html>
<html>
<head>
  <title>LAC Display</title>
  <link rel="stylesheet" href="style.css">

  <!-- Optional: remove favicon error -->
  <link rel="icon" href="data:,">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    #countdown {
      text-align: center;
      font-size: 30px;
      position: absolute;
      top: 10px;
      width: 100%;
    }

    #content {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .fullscreen {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
  </style>
</head>

<body>

<div id="countdown"></div>
<div id="content"></div>

<!-- 🔥 Firebase SDK (REQUIRED - THIS WAS MISSING) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- 🔥 Your Firebase Config -->
<script src="firebase.js"></script>

<script>
console.log("LAC Page Loaded ✅");

// Get LAC from URL
const params = new URLSearchParams(window.location.search);
let lac = params.get("name");

// Fallback if no parameter
if (!lac) {
  lac = "Lakhipur";
}

let currentTime = 0;

// 🔁 Real-time listener
db.collection("lacData").doc(lac)
.onSnapshot((doc) => {
  if (!doc.exists) return;

  const data = doc.data();

  if (data.updatedAt !== currentTime) {
    currentTime = data.updatedAt;

    // 👉 OPTION 1 (with countdown)
    startCountdown(data);

    // 👉 OPTION 2 (instant update - uncomment below if needed)
    // loadContent(data);
  }
});

function startCountdown(data) {
  let count = 3;
  const cd = document.getElementById("countdown");

  const interval = setInterval(() => {
    cd.innerText = "Updating in " + count;
    count--;

    if (count < 0) {
      clearInterval(interval);
      cd.innerText = "";
      loadContent(data);
    }
  }, 1000);
}

function loadContent(data) {
  const div = document.getElementById("content");
  div.innerHTML = "";

  // Show image
  if (data.type && data.type.includes("image")) {
    const img = document.createElement("img");
    img.src = data.fileData;
    img.className = "fullscreen";
    div.appendChild(img);
  }
}
</script>

</body>
</html>
