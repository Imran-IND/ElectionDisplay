<!DOCTYPE html>
<html>
<head>
<title>LAC Display</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

/* Image */
#screen {
  width:100vw;
  height:100vh;
  object-fit:contain;
}

/* Loader */
#loader {
  position:absolute;
  color:white;
  font-size:4vw;
  text-align:center;
}

/* Smooth fade */
.fade {
  opacity:0;
  transition:0.25s ease-in-out;
}
.show {
  opacity:1;
}

/* Countdown Overlay */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#updateText {
  font-size:4vw;
}

#countdown {
  font-size:18vw;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="loader">📡 Waiting for data...</div>
<img id="screen" class="fade">

<div id="overlay">
  <div id="updateText"></div>
  <div id="countdown">10</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// 🔹 GET LAC
const params = new URLSearchParams(window.location.search);
const lac = params.get("name") || "Lakhipur";

const img = document.getElementById("screen");
const loader = document.getElementById("loader");
const overlay = document.getElementById("overlay");
const countdown = document.getElementById("countdown");
const updateText = document.getElementById("updateText");

let currentRound = null;
let isUpdating = false;

// 🔴 REAL-TIME LISTENER
db.collection("lacData")
.doc(lac)
.collection("rounds")
.orderBy("time","desc")
.limit(1)
.onSnapshot(async (snap) => {

  // Ignore during update
  if (isUpdating) return;

  // No data
  if (snap.empty) {
    img.src = "";
    img.style.display = "none";

    loader.innerText = "📡 Data will be updated soon...";
    loader.style.display = "block";
    return;
  }

  const doc = snap.docs[0];
  const newImage = doc.data().fileData;
  const newRound = doc.data().round;

  // Ignore same round
  if (newRound === currentRound) return;

  // Lock
  isUpdating = true;
  currentRound = newRound;

  // Show overlay
  overlay.style.display = "flex";
  updateText.innerText = `Updating Round ${newRound}`;

  // Preload image
  const temp = new Image();
  temp.src = newImage;

  // Countdown
  for (let i = 10; i >= 1; i--) {
    countdown.innerText = i;
    await new Promise(requestAnimationFrame);
    await new Promise(r => setTimeout(r, 1000));
  }

  // Wait for image load
  await new Promise(resolve => {
    if (temp.complete) resolve();
    else temp.onload = resolve;
  });

  // Update image (no blank state)
  img.src = newImage;

  overlay.style.display = "none";

  img.style.display = "block";
  img.classList.remove("show");

  setTimeout(() => {
    img.classList.add("show");
    loader.style.display = "none";
    isUpdating = false;
  }, 100);

});

</script>

</body>
</html>
