<!DOCTYPE html>
<html>
<head>
<title>LAC Display</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* Image */
#screen {
  width:100vw;
  height:100vh;
  object-fit:contain;
}

/* Loader */
#loader {
  position:absolute;
  color:white;
  font-size:25px;
  font-family:Arial;
}

/* Fade effect */
.fade {
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
.show {
  opacity:1;
}
</style>
</head>

<body>

<div id="loader">📡 Waiting for data...</div>
<img id="screen" class="fade" />

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const lac = params.get("name") || "Lakhipur";

const img = document.getElementById("screen");
const loader = document.getElementById("loader");

let currentImage = "";

// 🔴 LIVE LISTENER
db.collection("lacData")
.doc(lac)
.collection("rounds")
.orderBy("time","desc")
.limit(1)
.onSnapshot(snap => {

  if (snap.empty) {
    loader.innerText = "⚠️ No data available";
    return;
  }

  snap.forEach(doc => {
    const newImage = doc.data().fileData;

    // Avoid reload if same image
    if (newImage === currentImage) return;

    currentImage = newImage;

    // Show loading text
    loader.innerText = "🔄 Updating...";
    loader.style.display = "block";

    // Preload image
    const temp = new Image();
    temp.src = newImage;

    temp.onload = () => {
      img.classList.remove("show");
      
      setTimeout(() => {
        img.src = newImage;
        img.classList.add("show");

        loader.style.display = "none";
      }, 300);
    };

  });

});

</script>

</body>
</html>
