<!DOCTYPE html>
<html>
<head>
<title>LAC Display</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

#screen {
  width:100vw;
  height:100vh;
  object-fit:contain;
}

#loader {
  position:absolute;
  color:white;
  font-size:4vw;
  text-align:center;
}

.fade {
  opacity:0;
  transition:0.5s;
}
.show {
  opacity:1;
}

/* 🔴 COUNTDOWN */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#updateText { font-size:4vw; }
#countdown { font-size:18vw; font-weight:bold; }
</style>
</head>

<body>

<div id="loader">📡 Waiting for data...</div>
<img id="screen" class="fade">

<div id="overlay">
  <div id="updateText"></div>
  <div id="countdown"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const lac = params.get("name") || "Lakhipur";

const img = document.getElementById("screen");
const loader = document.getElementById("loader");
const countdown = document.getElementById("countdown");

let currentImage = "";
let isUpdating = false; // 🔥 IMPORTANT LOCK

// 🔴 LIVE LISTENER
db.collection("lacData")
.doc(lac)
.collection("rounds")
.orderBy("time","desc")
.limit(1)
.onSnapshot(async (snap) => {

  // ❌ NO DATA → SHOW MESSAGE
  if (snap.empty) {
    img.src = "";
    img.style.display = "none";

    loader.innerText = "📡 Data will be updated soon...";
    loader.style.display = "block";

    countdown.style.display = "none";
    return;
  }

  const doc = snap.docs[0];
  const newImage = doc.data().fileData;

  // ❌ SAME IMAGE → DO NOTHING
  if (newImage === currentImage) return;

  // ❌ IF ALREADY UPDATING → IGNORE NEW TRIGGER
  if (isUpdating) return;

  isUpdating = true; // 🔒 LOCK

  currentImage = newImage;

  // 🔥 SHOW COUNTDOWN
  img.classList.remove("show");

  loader.innerText = "📡 Updating...";
  loader.style.display = "block";

  countdown.style.display = "block";

  let count = 10;

  countdown.innerText = count;

  const interval = setInterval(() => {
    count--;
    countdown.innerText = count;

    if (count === 0) {
      clearInterval(interval);

      // 🔥 PRELOAD IMAGE
      const temp = new Image();
      temp.src = newImage;

      temp.onload = () => {

        img.src = newImage;
        img.style.display = "block";

        setTimeout(() => {
          img.classList.add("show");

          loader.style.display = "none";
          countdown.style.display = "none";

          isUpdating = false; // 🔓 UNLOCK
        }, 200);
      };
    }

  }, 1000); // ✅ EXACT 1 SECOND

});

</script>
  
</body>
</html>
