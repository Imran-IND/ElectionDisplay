<!DOCTYPE html>
<html>
<head>
<title>LAC Display</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

#screen {
  width:100vw;
  height:100vh;
  object-fit:contain;
}

#loader {
  position:absolute;
  color:white;
  font-size:4vw;
  text-align:center;
}

.fade {
  opacity:0;
  transition:0.5s;
}
.show {
  opacity:1;
}

/* 🔴 COUNTDOWN */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#updateText { font-size:4vw; }
#countdown { font-size:18vw; font-weight:bold; }
</style>
</head>

<body>

<div id="loader">📡 Waiting for data...</div>
<img id="screen" class="fade">

<div id="overlay">
  <div id="updateText"></div>
  <div id="countdown"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const lac = params.get("name") || "Lakhipur";

const img = document.getElementById("screen");
const loader = document.getElementById("loader");

const overlay = document.getElementById("overlay");
const updateText = document.getElementById("updateText");
const countdown = document.getElementById("countdown");

let currentImage = "";
let lastRound = null;
let isCounting = false;

// 🔴 COUNTDOWN
async function showCountdown(round) {
  if (isCounting) return;
  isCounting = true;

  overlay.style.display = "flex";
  updateText.innerText = `Updating Round ${round}`;

  for (let i = 10; i >= 1; i--) {
    countdown.innerText = i;
    await new Promise(r => setTimeout(r, 1000));
  }

  overlay.style.display = "none";
  isCounting = false;
}

// 🔴 IMAGE UPDATE
function updateImage(url) {
  loader.innerText = "🔄 Loading...";
  loader.style.display = "block";

  const temp = new Image();
  temp.src = url;

  temp.onload = () => {
    img.classList.remove("show");

    setTimeout(() => {
      img.src = url;
      img.classList.add("show");
      loader.style.display = "none";
    }, 300);
  };
}

// 🔴 REALTIME
db.collection("lacData")
.doc(lac)
.collection("rounds")
.orderBy("time","desc")
.limit(1)
.onSnapshot(async snap => {

  if (snap.empty) {
    currentImage = "";
    lastRound = null;

    img.src = "";
    img.classList.remove("show");

    loader.innerText = "📡 Data will be updated soon...";
    loader.style.display = "block";
    return;
  }

  snap.forEach(async doc => {

    const d = doc.data();
    const newImage = d.fileData;
    const newRound = d.round;

    // First load
    if (lastRound === null) {
      lastRound = newRound;
      updateImage(newImage);
      currentImage = newImage;
      return;
    }

    // New round
    if (newRound !== lastRound) {
      lastRound = newRound;

      await showCountdown(newRound);
      updateImage(newImage);

      currentImage = newImage;
      return;
    }

    // Same round image change
    if (newImage !== currentImage) {
      updateImage(newImage);
      currentImage = newImage;
    }

  });

});

</script>

</body>
</html>
