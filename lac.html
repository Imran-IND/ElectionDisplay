<!DOCTYPE html>
<html>
<head>
<title>LAC Display</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

/* Image */
#screen {
  width:100vw;
  height:100vh;
  object-fit:contain;
}

/* Message */
#loader {
  position:absolute;
  color:white;
  font-size:4vw;
  text-align:center;
}

/* Fade */
.fade {
  opacity:0;
  transition:opacity 0.5s ease-in-out;
}
.show {
  opacity:1;
}

/* 🔴 COUNTDOWN OVERLAY */
#overlay {
  position:fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#updateText {
  font-size:4vw;
}

#countdown {
  font-size:18vw;
  font-weight:bold;
  margin-top:20px;
}
</style>
</head>

<body>

<div id="loader">📡 Waiting for data...</div>
<img id="screen" class="fade" />

<!-- 🔴 COUNTDOWN -->
<div id="overlay">
  <div id="updateText"></div>
  <div id="countdown"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// 🔹 GET LAC
const params = new URLSearchParams(window.location.search);
const lac = params.get("name") || "Lakhipur";

const img = document.getElementById("screen");
const loader = document.getElementById("loader");

const overlay = document.getElementById("overlay");
const updateText = document.getElementById("updateText");
const countdown = document.getElementById("countdown");

let currentImage = "";
let lastRound = null;
let isCounting = false;

// 🔴 COUNTDOWN FUNCTION (FIXED)
async function showCountdown(round) {

  if (isCounting) return; // prevent duplicate
  isCounting = true;

  overlay.style.display = "flex";
  updateText.innerHTML = `🔴 Updating Round ${round}`;

  for (let i = 10; i >= 1; i--) {
    countdown.innerHTML = i;
    await new Promise(resolve => setTimeout(resolve, 1000)); // exact 1 sec
  }

  overlay.style.display = "none";
  isCounting = false;
}

// 🔹 IMAGE UPDATE FUNCTION
function updateImage(newImage) {

  loader.innerText = "🔄 Loading...";
  loader.style.display = "block";

  const temp = new Image();
  temp.src = newImage;

  temp.onload = () => {
    img.classList.remove("show");

    setTimeout(() => {
      img.src = newImage;
      img.classList.add("show");

      loader.style.display = "none";
    }, 300);
  };
}

// 🔴 REAL-TIME LISTENER
db.collection("lacData")
  .doc(lac)
  .collection("rounds")
  .orderBy("time","desc")
  .limit(1)
  .onSnapshot(async snap => {

    // ❌ NO DATA (deleted)
    if (snap.empty) {

      currentImage = "";
      lastRound = null;

      img.src = "";
      img.classList.remove("show");

      loader.innerText = "📡 Data will be updated soon...";
      loader.style.display = "block";

      return;
    }

    snap.forEach(async doc => {

      const data = doc.data();
      const newImage = data.fileData;
      const newRound = data.round;

      // First load (no countdown)
      if (lastRound === null) {
        lastRound = newRound;
        updateImage(newImage);
        return;
      }

      // 🔴 NEW ROUND → COUNTDOWN FIRST
      if (newRound !== lastRound) {
        lastRound = newRound;

        await showCountdown(newRound);

        updateImage(newImage);
        return;
      }

      // Same round, different image
      if (newImage !== currentImage) {
        updateImage(newImage);
      }

      currentImage = newImage;

    });

  });

</script>

</body>
</html>
