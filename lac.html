<!DOCTYPE html>
<html>
<head>
<title>LAC Display</title>

<link rel="icon" href="data:,">

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

/* Image */
#screen {
  width:100vw;
  height:100vh;
  object-fit:contain;
}

/* Loader */
#loader {
  position:absolute;
  color:white;
  font-size:4vw;
  text-align:center;
}

/* Smooth fade */
.fade {
  opacity:0;
  transition:0.25s ease-in-out;
}
.show {
  opacity:1;
}

/* Countdown Overlay */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#updateText {
  font-size:4vw;
}

#countdown {
  font-size:18vw;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="loader">📡 Waiting for data...</div>
<img id="screen" class="fade">

<div id="overlay">
  <div id="updateText"></div>
  <div id="countdown">10</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

// GET LAC FROM URL
const params = new URLSearchParams(window.location.search);
let lac = params.get("name") || "Lakhipur";

// ✅ Normalize (VERY IMPORTANT)
lac = lac.trim().toLowerCase();

// ✅ Map to exact Firestore names
const LAC_MAP = {
  lakhipur: "Lakhipur",
  udharbond: "Udharbond",
  borkhola: "Borkhola",
  katigorah: "Katigorah",
  silchar: "Silchar",
  sonai: "Sonai",
  dholai: "Dholai"
};

lac = LAC_MAP[lac] || "Lakhipur";

console.log("📺 Listening for LAC:", lac);

// ELEMENTS
const img = document.getElementById("screen");
const loader = document.getElementById("loader");
const overlay = document.getElementById("overlay");
const countdown = document.getElementById("countdown");
const updateText = document.getElementById("updateText");

let lastUpdateTime = 0;
let isUpdating = false;

// REAL-TIME LISTENER
db.collection("lacData")
  .doc(lac)
  .collection("rounds")
  .orderBy("time","desc")
  .limit(1)
  .onSnapshot(async (snap) => {

    console.log("📡 Snapshot received:", snap.size);

    // IGNORE DURING UPDATE
    if (isUpdating) return;

    // ❗ NO DATA
    if (snap.empty) {
      loader.innerText = "📡 Waiting for first update...";
      loader.style.display = "block";
      img.style.display = "none";
      return;
    }

    const data = snap.docs[0].data();

    const newImage = data.fileData;
    const newRound = data.round;
    const newTime = data.time;

    console.log("🆕 New Data:", data);

    // IGNORE SAME UPDATE
    if (newTime === lastUpdateTime) return;

    isUpdating = true;
    lastUpdateTime = newTime;

    // SHOW OVERLAY
    overlay.style.display = "flex";
    updateText.innerText = `Updating Round ${newRound}`;

    // PRELOAD IMAGE
    const temp = new Image();
    temp.src = newImage;

    // COUNTDOWN
    for (let i = 20; i >= 1; i--) {
      countdown.innerText = i;
      await new Promise(r => setTimeout(r, 1000));
    }

    // WAIT IMAGE LOAD
    await new Promise(resolve => {
      if (temp.complete) resolve();
      else temp.onload = resolve;
    });

    // SHOW IMAGE
    img.src = newImage;

    overlay.style.display = "none";
    img.style.display = "block";
    img.classList.remove("show");

    setTimeout(() => {
      img.classList.add("show");
      loader.style.display = "none";
      isUpdating = false;
    }, 100);

  }, (error) => {
    console.error("❌ Firestore Error:", error);
    loader.innerText = "⚠️ Connection error";
    loader.style.display = "block";
  });

</script>

</body>
</html>
