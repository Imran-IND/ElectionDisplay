<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>LAC Display</title>
</head>
<body>

<div id="countdown" style="text-align:center; font-size:30px;"></div>
<div id="content"></div>

<script src="firebase.js"></script>

<script>
console.log("LAC Page Loaded ✅");

const params = new URLSearchParams(window.location.search);
const lac = params.get("name");

let currentTime = 0;

// 🔁 Real-time listener
db.collection("lacData").doc(lac)
.onSnapshot((doc) => {
  if (!doc.exists) return;

  const data = doc.data();

  if (data.updatedAt !== currentTime) {
    currentTime = data.updatedAt;
    startCountdown(data);
  }
});

function startCountdown(data) {
  let count = 5;
  const cd = document.getElementById("countdown");

  const interval = setInterval(() => {
    cd.innerText = "Updating in " + count;
    count--;

    if (count < 0) {
      clearInterval(interval);
      cd.innerText = "";
      loadContent(data);
    }
  }, 1000);
}

function loadContent(data) {
  const div = document.getElementById("content");
  div.innerHTML = "";

  if (data.type.includes("image")) {
    const img = document.createElement("img");
    img.src = data.fileData;
    img.className = "fullscreen";
    div.appendChild(img);
  }
}
</script>

</body>
</html>
